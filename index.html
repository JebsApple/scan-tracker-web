<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scan Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;700&family=Archivo+Narrow:wght@500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<link rel="stylesheet" href="styles/tokens.css">
<link rel="stylesheet" href="styles/base.css">
<link rel="stylesheet" href="styles/components.css">
</head>
<body>

<!-- Sprite de íconos SVG (Lucide) inline en el body — así los <use> de más
     abajo resuelven en el primer render, sin parpadeo por un fetch async. -->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <symbol id="i-layout-dashboard" viewBox="0 0 24 24">
    <rect width="7" height="9" x="3" y="3" rx="1" />
    <rect width="7" height="5" x="14" y="3" rx="1" />
    <rect width="7" height="9" x="14" y="12" rx="1" />
    <rect width="7" height="5" x="3" y="16" rx="1" />
  </symbol>
  <symbol id="i-list-checks" viewBox="0 0 24 24">
    <path d="M13 5h8" />
    <path d="M13 12h8" />
    <path d="M13 19h8" />
    <path d="m3 17 2 2 4-4" />
    <path d="m3 7 2 2 4-4" />
  </symbol>
  <symbol id="i-refresh-cw" viewBox="0 0 24 24">
    <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8" />
    <path d="M21 3v5h-5" />
    <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16" />
    <path d="M8 16H3v5" />
  </symbol>
  <symbol id="i-undo-2" viewBox="0 0 24 24">
    <path d="M9 14 4 9l5-5" />
    <path d="M4 9h10.5a5.5 5.5 0 0 1 5.5 5.5a5.5 5.5 0 0 1-5.5 5.5H11" />
  </symbol>
  <symbol id="i-redo-2" viewBox="0 0 24 24">
    <path d="m15 14 5-5-5-5" />
    <path d="M20 9H9.5A5.5 5.5 0 0 0 4 14.5A5.5 5.5 0 0 0 9.5 20H13" />
  </symbol>
  <symbol id="i-log-in" viewBox="0 0 24 24">
    <path d="m10 17 5-5-5-5" />
    <path d="M15 12H3" />
    <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" />
  </symbol>
  <symbol id="i-settings" viewBox="0 0 24 24">
    <path d="M9.671 4.136a2.34 2.34 0 0 1 4.659 0 2.34 2.34 0 0 0 3.319 1.915 2.34 2.34 0 0 1 2.33 4.033 2.34 2.34 0 0 0 0 3.831 2.34 2.34 0 0 1-2.33 4.033 2.34 2.34 0 0 0-3.319 1.915 2.34 2.34 0 0 1-4.659 0 2.34 2.34 0 0 0-3.32-1.915 2.34 2.34 0 0 1-2.33-4.033 2.34 2.34 0 0 0 0-3.831A2.34 2.34 0 0 1 6.35 6.051a2.34 2.34 0 0 0 3.319-1.915" />
    <circle cx="12" cy="12" r="3" />
  </symbol>
  <symbol id="i-eye" viewBox="0 0 24 24">
    <path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0" />
    <circle cx="12" cy="12" r="3" />
  </symbol>
  <symbol id="i-eye-off" viewBox="0 0 24 24">
    <path d="M10.733 5.076a10.744 10.744 0 0 1 11.205 6.575 1 1 0 0 1 0 .696 10.747 10.747 0 0 1-1.444 2.49" />
    <path d="M14.084 14.158a3 3 0 0 1-4.242-4.242" />
    <path d="M17.479 17.499a10.75 10.75 0 0 1-15.417-5.151 1 1 0 0 1 0-.696 10.75 10.75 0 0 1 4.446-5.143" />
    <path d="m2 2 20 20" />
  </symbol>
  <symbol id="i-cloud" viewBox="0 0 24 24">
    <path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z" />
  </symbol>
  <symbol id="i-alert-triangle" viewBox="0 0 24 24">
    <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3" />
    <path d="M12 9v4" />
    <path d="M12 17h.01" />
  </symbol>
  <symbol id="i-history" viewBox="0 0 24 24">
    <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
    <path d="M3 3v5h5" />
    <path d="M12 7v5l4 2" />
  </symbol>
  <symbol id="i-plus" viewBox="0 0 24 24">
    <path d="M5 12h14" />
    <path d="M12 5v14" />
  </symbol>
  <symbol id="i-x" viewBox="0 0 24 24">
    <path d="M18 6 6 18" />
    <path d="m6 6 12 12" />
  </symbol>
  <symbol id="i-check" viewBox="0 0 24 24">
    <path d="M20 6 9 17l-5-5" />
  </symbol>
  <symbol id="i-chevron-down" viewBox="0 0 24 24">
    <path d="m6 9 6 6 6-6" />
  </symbol>
  <symbol id="i-upload" viewBox="0 0 24 24">
    <path d="M12 3v12" />
    <path d="m17 8-5-5-5 5" />
    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
  </symbol>
</svg>

<div id="top">
  <div id="logo">SCAN<b>TRACKER</b></div>
  <button class="btn" id="fMine"><svg class="icon"><use href="#i-list-checks"/></svg> Mis tareas</button>
  <select id="fPrio" style="border-radius:99px">
    <option value="">Toda prioridad</option>
    <option value="URGENTE">Urgente</option>
    <option value="MODERADO">Moderado</option>
    <option value="A TU TIEMPO">A tu tiempo</option>
  </select>
  <select id="fEstado" style="border-radius:99px">
    <option value="">Todo estado</option>
    <option value="pend">Pendientes</option>
    <option value="done">Completos</option>
  </select>
  <select id="fEtapa" style="border-radius:99px">
    <option value="">Toda etapa</option>
  </select>
  <select id="fOrden" style="border-radius:99px">
    <option value="">Orden: Nº capítulo</option>
    <option value="urgencia">Orden: urgencia</option>
  </select>
  <input id="fBusca" placeholder="Buscar persona..." style="border-radius:99px;width:150px">
  <div class="sp"></div>
  <button class="btn" id="bGoogle"><svg class="icon"><use href="#i-log-in"/></svg> Conectar Google</button>
  <button class="btn" id="bUndo" title="Deshacer" disabled><svg class="icon"><use href="#i-undo-2"/></svg></button>
  <button class="btn" id="bRedo" title="Rehacer" disabled><svg class="icon"><use href="#i-redo-2"/></svg></button>
  <button class="btn" id="bSync" title="Recargar hojas vinculadas de Google"><svg class="icon"><use href="#i-refresh-cw"/></svg> Sincronizar</button>
  <button class="btn" id="bDash"><svg class="icon"><use href="#i-layout-dashboard"/></svg> Dashboard</button>
  <button class="btn" id="bHist"><svg class="icon"><use href="#i-history"/></svg> Mi historial</button>
  <button class="btn" id="bCfg"><svg class="icon"><use href="#i-settings"/></svg> Mis nombres</button>
</div>

<div id="main">
  <div id="side">
    <h3>Series</h3>
    <div id="serieList"></div>
    <div id="sideFoot">
      <button class="btn red" id="bAddSerie">+ Serie</button>
      <button class="btn" id="bExport"><svg class="icon"><use href="#i-upload"/></svg> Exportar</button>
    </div>
  </div>
  <div id="content"></div>
</div>

<div id="ovl"><div class="modal" id="modal"></div></div>
<div id="toast"></div>
<input type="file" id="csvFile" accept=".csv,.txt" style="display:none">

<script type="module" src="src/app.js"></script>
</body>
</html>
